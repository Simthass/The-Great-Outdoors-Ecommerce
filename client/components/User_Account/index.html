<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Account - Edit Profile</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="nav-item active">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </div>
            <div class="nav-item" onclick="navigateToPage('notifications.html')">
                <i class="fas fa-bell"></i>
                <span>Notification</span>
            </div>
            <div class="nav-item" onclick="navigateToPage('security.html')">
                <i class="fas fa-shield-alt"></i>
                <span>Security</span>
            </div>
            <div class="nav-item" onclick="navigateToPage('appearance.html')">
                <i class="fas fa-palette"></i>
                <span>Appearance</span>
            </div>
            <div class="nav-item" onclick="navigateToPage('my-orders.html')">
                <i class="fas fa-shopping-bag"></i>
                <span>My Orders</span>
            </div>
            <div class="nav-item" onclick="navigateToPage('addresses.html')">
                <i class="fas fa-map-marker-alt"></i>
                <span>Addresses</span>
            </div>
            <div class="nav-item" onclick="navigateToPage('help.html')">
                <i class="fas fa-question-circle"></i>
                <span>Help</span>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <div class="profile-header">
                <h1>Edit profile</h1>
                <div class="profile-avatar">
                    <img src="https://via.placeholder.com/80x80/cccccc/666666?text=Avatar" alt="Profile Avatar" id="avatar-img">
                    <input type="file" id="avatar-upload" accept="image/*" style="display: none;">
                    <button class="avatar-upload-btn" onclick="document.getElementById('avatar-upload').click()">
                        <i class="fas fa-camera"></i>
                    </button>
                </div>
            </div>

            <form class="profile-form" id="profileForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" name="firstName" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" name="lastName" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" name="address">
                </div>

                <div class="form-group">
                    <label for="contactNumber">Contact Number</label>
                    <input type="tel" id="contactNumber" name="contactNumber">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="city">City</label>
                        <select id="city" name="city">
                            <option value="">Select City</option>
                            <option value="new-york">New York</option>
                            <option value="los-angeles">Los Angeles</option>
                            <option value="chicago">Chicago</option>
                            <option value="houston">Houston</option>
                            <option value="phoenix">Phoenix</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="state">State</label>
                        <select id="state" name="state">
                            <option value="">Select State</option>
                            <option value="california">California</option>
                            <option value="texas">Texas</option>
                            <option value="florida">Florida</option>
                            <option value="new-york">New York</option>
                            <option value="illinois">Illinois</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-input">
                        <input type="password" id="password" name="password">
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i class="fas fa-eye" id="password-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-cancel">Cancel</button>
                    <button type="submit" class="btn btn-save">Save</button>
                </div>
            </form>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
