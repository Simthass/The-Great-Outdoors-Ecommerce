<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - User Account</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="notifications.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="nav-item" onclick="navigateToPage('index.html')">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </div>
            <div class="nav-item active">
                <i class="fas fa-bell"></i>
                <span>Notification</span>
            </div>
            <div class="nav-item" onclick="navigateToPage('security.html')">
                <i class="fas fa-shield-alt"></i>
                <span>Security</span>
            </div>
            <div class="nav-item" onclick="navigateToPage('appearance.html')">
                <i class="fas fa-palette"></i>
                <span>Appearance</span>
            </div>
            <div class="nav-item" onclick="navigateToPage('my-orders.html')">
                <i class="fas fa-shopping-bag"></i>
                <span>My Orders</span>
            </div>
            <div class="nav-item" onclick="navigateToPage('addresses.html')">
                <i class="fas fa-map-marker-alt"></i>
                <span>Addresses</span>
            </div>
            <div class="nav-item" onclick="navigateToPage('help.html')">
                <i class="fas fa-question-circle"></i>
                <span>Help</span>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <div class="notifications-header">
                <h1>Notifications</h1>
                <div class="profile-avatar">
                    <img src="https://via.placeholder.com/60x60/cccccc/666666?text=Avatar" alt="Profile Avatar">
                </div>
            </div>

            <!-- Notification Settings -->
            <div class="notification-settings-container">
                <h2>Notification Preferences</h2>
                <div class="settings-grid">
                    <div class="setting-card">
                        <div class="setting-header">
                            <div class="setting-info">
                                <h3>Email Notifications</h3>
                                <p>Receive notifications via email</p>
                            </div>
                            <label class="toggle-switch">
                                <input type="checkbox" id="emailNotifications" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="setting-options" id="emailOptions">
                            <label class="checkbox-option">
                                <input type="checkbox" id="orderUpdates" checked>
                                <span class="checkmark"></span>
                                Order updates and shipping notifications
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" id="promotions" checked>
                                <span class="checkmark"></span>
                                Promotional offers and discounts
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" id="accountSecurity">
                                <span class="checkmark"></span>
                                Account security alerts
                            </label>
                        </div>
                    </div>

                    <div class="setting-card">
                        <div class="setting-header">
                            <div class="setting-info">
                                <h3>SMS Notifications</h3>
                                <p>Receive notifications via SMS</p>
                            </div>
                            <label class="toggle-switch">
                                <input type="checkbox" id="smsNotifications">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="setting-options" id="smsOptions" style="display: none;">
                            <label class="checkbox-option">
                                <input type="checkbox" id="smsOrderUpdates">
                                <span class="checkmark"></span>
                                Order delivery notifications
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" id="smsAccountAlerts">
                                <span class="checkmark"></span>
                                Important account alerts
                            </label>
                        </div>
                    </div>

                    <div class="setting-card">
                        <div class="setting-header">
                            <div class="setting-info">
                                <h3>Push Notifications</h3>
                                <p>Receive browser push notifications</p>
                            </div>
                            <label class="toggle-switch">
                                <input type="checkbox" id="pushNotifications">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="setting-options" id="pushOptions" style="display: none;">
                            <label class="checkbox-option">
                                <input type="checkbox" id="pushOrderUpdates">
                                <span class="checkmark"></span>
                                Order status changes
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" id="pushMessages">
                                <span class="checkmark"></span>
                                New messages and updates
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Recent Notifications -->
            <div class="recent-notifications-container">
                <div class="notifications-toolbar">
                    <h2>Recent Notifications</h2>
                    <div class="toolbar-actions">
                        <button class="btn-secondary" id="markAllRead">Mark All Read</button>
                        <button class="btn-secondary" id="clearAll">Clear All</button>
                    </div>
                </div>

                <!-- Notification Filters -->
                <div class="notification-filters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="unread">Unread</button>
                    <button class="filter-btn" data-filter="orders">Orders</button>
                    <button class="filter-btn" data-filter="security">Security</button>
                    <button class="filter-btn" data-filter="promotions">Promotions</button>
                </div>

                <!-- Notifications List -->
                <div class="notifications-list" id="notificationsList">
                    <!-- Notifications will be populated here by JavaScript -->
                </div>

                <!-- Pagination for notifications -->
                <div class="notifications-pagination">
                    <button class="pagination-btn" id="loadMore">Load More Notifications</button>
                </div>
            </div>

            <!-- Save Button -->
            <div class="save-settings">
                <button class="btn btn-save" id="saveSettings">Save Settings</button>
            </div>
        </main>
    </div>

    <script src="notifications.js"></script>
</body>
</html>
