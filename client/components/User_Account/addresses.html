<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Address - User Account</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="addresses.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="nav-item" onclick="navigateToPage('index.html')">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </div>
            <div class="nav-item" onclick="navigateToPage('notifications.html')">
                <i class="fas fa-bell"></i>
                <span>Notification</span>
            </div>
            <div class="nav-item" onclick="navigateToPage('security.html')">
                <i class="fas fa-shield-alt"></i>
                <span>Security</span>
            </div>
            <div class="nav-item" onclick="navigateToPage('appearance.html')">
                <i class="fas fa-palette"></i>
                <span>Appearance</span>
            </div>
            <div class="nav-item" onclick="navigateToPage('my-orders.html')">
                <i class="fas fa-shopping-bag"></i>
                <span>My Orders</span>
            </div>
            <div class="nav-item active">
                <i class="fas fa-map-marker-alt"></i>
                <span>Addresses</span>
            </div>
            <div class="nav-item" onclick="navigateToPage('help.html')">
                <i class="fas fa-question-circle"></i>
                <span>Help</span>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <div class="address-header">
                <h1>Add Address</h1>
                <div class="profile-avatar">
                    <img src="https://via.placeholder.com/60x60/cccccc/666666?text=Avatar" alt="Profile Avatar">
                </div>
            </div>

            <!-- Address Form -->
            <div class="address-form-container">
                <form class="address-form" id="addressForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">First Name</label>
                            <input type="text" id="firstName" name="firstName" required>
                        </div>
                        <div class="form-group">
                            <label for="lastName">Last Name</label>
                            <input type="text" id="lastName" name="lastName" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="addressLine1">Address Line 1</label>
                        <input type="text" id="addressLine1" name="addressLine1" required>
                    </div>

                    <div class="form-group">
                        <label for="addressLine2">Address Line 2</label>
                        <input type="text" id="addressLine2" name="addressLine2" placeholder="Optional">
                    </div>

                    <div class="form-group">
                        <label for="contactNumber">Contact Number</label>
                        <input type="tel" id="contactNumber" name="contactNumber" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="city">City</label>
                            <select id="city" name="city" required>
                                <option value="">Select City</option>
                                <option value="new-york">New York</option>
                                <option value="los-angeles">Los Angeles</option>
                                <option value="chicago">Chicago</option>
                                <option value="houston">Houston</option>
                                <option value="phoenix">Phoenix</option>
                                <option value="philadelphia">Philadelphia</option>
                                <option value="san-antonio">San Antonio</option>
                                <option value="san-diego">San Diego</option>
                                <option value="dallas">Dallas</option>
                                <option value="san-jose">San Jose</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="zipCode">Zip Code</label>
                            <select id="zipCode" name="zipCode" required>
                                <option value="">Select Zip Code</option>
                                <option value="10001">10001 - New York, NY</option>
                                <option value="90210">90210 - Beverly Hills, CA</option>
                                <option value="60601">60601 - Chicago, IL</option>
                                <option value="77001">77001 - Houston, TX</option>
                                <option value="85001">85001 - Phoenix, AZ</option>
                                <option value="19101">19101 - Philadelphia, PA</option>
                                <option value="78201">78201 - San Antonio, TX</option>
                                <option value="92101">92101 - San Diego, CA</option>
                                <option value="75201">75201 - Dallas, TX</option>
                                <option value="95101">95101 - San Jose, CA</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-cancel">Cancel</button>
                        <button type="submit" class="btn btn-save">Save</button>
                    </div>
                </form>
            </div>

            <!-- Saved Addresses Section -->
            <div class="saved-addresses-section">
                <h2>Saved Addresses</h2>
                <div class="addresses-grid" id="addressesGrid">
                    <!-- Saved addresses will be populated here -->
                </div>
            </div>
        </main>
    </div>

    <script src="addresses.js"></script>
</body>
</html>
